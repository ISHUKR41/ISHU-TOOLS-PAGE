<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Modern font stack — Inter for UI, JetBrains Mono for code/numbers.
         preconnect first so DNS+TLS happen in parallel with HTML parse. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" media="print" onload="this.media='all'" />

    <!-- ═══════════════════════════════════════════════════════════════════
         CRITICAL CSS — Inlined first, no external dependency, zero FOUC.
         ALL values EXACTLY mirror frontend/src/index.css to prevent reflow.
         Rule: if it's visible above the fold, it MUST be here.
         ═══════════════════════════════════════════════════════════════════ -->
    <style>
      /* ══════════════════════════════════════════════════════════════════════
         CRITICAL CSS — Covers ALL above-fold elements. Zero FOUC, zero CLS.
         Every rule EXACTLY mirrors frontend/src/index.css. No approximations.
         Rule: visible above the fold → MUST be here, not in the lazy bundle.
         ══════════════════════════════════════════════════════════════════════ */

      /* ── Box model reset ── */
      *,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

      /* ── Design tokens — mirror :root in index.css exactly ── */
      :root{
        color-scheme:dark;
        --bg:#000000;--bg-soft:#0a0a0c;
        --panel:rgba(18,18,20,0.6);--panel-border:rgba(255,255,255,0.08);
        --text:#f0f0f2;--muted:#a0a0a8;--muted-strong:#c8c8cf;
        --line:rgba(255,255,255,0.06);
        --accent:#007aff;--accent-2:#34c759;
        --shadow-md:0 12px 30px rgba(0,0,0,0.4);
        --shadow-lg:0 24px 64px rgba(0,0,0,0.55);
        /* Exact font stack from index.css — system fonts render instantly */
        --font-body:'Inter','Inter Tight',-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
        --font-display:'Space Grotesk',-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
      }

      /* ── HTML base ── */
      html,body,#root{min-height:100%;margin:0;padding:0}
      html{scroll-behavior:smooth;text-rendering:optimizeSpeed;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
      body{
        color:var(--text);font-family:var(--font-body);
        background:
          radial-gradient(circle at 12% 12%,rgba(58,122,255,0.2),transparent 28%),
          radial-gradient(circle at 82% 10%,rgba(48,255,189,0.14),transparent 24%),
          radial-gradient(circle at 50% 100%,rgba(139,92,246,0.12),transparent 22%),
          linear-gradient(180deg,#040813 0%,#03060e 45%,#060b16 100%);
        overflow-x:hidden;min-width:320px;
      }
      /* Grid overlay — must be here to avoid FOUC when full CSS loads */
      body::before{
        content:'';position:fixed;inset:0;pointer-events:none;
        background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
        background-size:54px 54px;opacity:0.07;
        mask-image:linear-gradient(180deg,rgba(0,0,0,0.7),transparent 92%);
      }
      #root{display:flex;flex-direction:column;min-height:100vh}
      a{color:inherit;text-decoration:none}
      button,input,textarea,select{font:inherit}
      img,svg{max-width:100%;height:auto;vertical-align:middle}
      h1,h2,h3,h4,h5,h6{margin:0;font-family:var(--font-display);letter-spacing:0}
      button,[role=button]{touch-action:manipulation}

      /* ── App loader — shown before React hydrates (modern) ── */
      .app-loader{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#061224 0%,#02060f 70%);overflow:hidden;isolation:isolate}
      .app-loader::before{content:'';position:absolute;inset:0;background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:28px 28px;mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,#000 30%,transparent 80%);-webkit-mask-image:radial-gradient(ellipse 60% 50% at 50% 50%,#000 30%,transparent 80%);z-index:-1}
      .app-loader-orb{position:absolute;width:380px;height:380px;border-radius:50%;filter:blur(80px) saturate(140%);mix-blend-mode:screen;pointer-events:none;z-index:-1;opacity:.7}
      .app-loader-orb.orb-1{background:radial-gradient(circle,#4ad4ff 0%,transparent 65%);top:18%;left:22%;animation:_orbA 6s ease-in-out infinite alternate}
      .app-loader-orb.orb-2{background:radial-gradient(circle,#a78bfa 0%,transparent 65%);bottom:18%;right:22%;animation:_orbB 7s ease-in-out infinite alternate}
      .app-loader-orb.orb-3{background:radial-gradient(circle,#4df0b5 0%,transparent 60%);top:50%;left:50%;transform:translate(-50%,-50%);animation:_orbC 8s ease-in-out infinite alternate}
      @keyframes _orbA{to{transform:translate(40px,30px) scale(1.1)}}
      @keyframes _orbB{to{transform:translate(-40px,-30px) scale(1.15)}}
      @keyframes _orbC{to{transform:translate(-50%,-50%) scale(1.18);opacity:.5}}
      .app-loader-stack{display:flex;flex-direction:column;align-items:center;gap:.85rem;padding:2.4rem 2.8rem;border-radius:28px;background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015));border:1px solid rgba(74,212,255,.18);backdrop-filter:blur(18px) saturate(140%);-webkit-backdrop-filter:blur(18px) saturate(140%);box-shadow:0 30px 80px rgba(0,0,0,.55),0 0 0 1px rgba(255,255,255,.04) inset}
      .app-loader-ring{position:relative;width:64px;height:64px;display:grid;place-items:center}
      .app-loader-ring-spin{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 0deg,transparent 0deg,#4ad4ff 90deg,#4df0b5 180deg,#a78bfa 270deg,transparent 360deg);-webkit-mask:radial-gradient(circle,transparent 56%,#000 58%);mask:radial-gradient(circle,transparent 56%,#000 58%);animation:_spin 1.1s linear infinite;filter:drop-shadow(0 0 12px rgba(74,212,255,.45))}
      .app-loader-ring-core{width:26px;height:26px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#cfeaff,#4ad4ff 60%,#1a4d6a 100%);box-shadow:0 0 18px rgba(74,212,255,.6),0 0 4px rgba(255,255,255,.6) inset;animation:_corePulse 1.6s ease-in-out infinite}
      @keyframes _spin{to{transform:rotate(360deg)}}
      @keyframes _corePulse{0%,100%{transform:scale(.92)}50%{transform:scale(1.08)}}
      .app-loader-text{font-family:'Space Grotesk','Inter Tight','Inter',sans-serif;font-size:1.15rem;font-weight:700;letter-spacing:.18em;background:linear-gradient(120deg,#4ad4ff 0%,#fff 50%,#a78bfa 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:_shine 3s ease-in-out infinite;margin-top:.4rem}
      .app-loader-sub{font-family:'Inter Tight','Inter',sans-serif;font-size:.78rem;letter-spacing:.06em;color:rgba(207,234,255,.55)}
      .app-loader-bar{width:180px;height:3px;border-radius:999px;background:rgba(255,255,255,.06);overflow:hidden;margin-top:.4rem;position:relative}
      .app-loader-bar>span{position:absolute;top:0;left:-40%;height:100%;width:40%;background:linear-gradient(90deg,transparent,#4ad4ff,#4df0b5,transparent);border-radius:999px;animation:_loaderBar 1.4s ease-in-out infinite;box-shadow:0 0 12px rgba(74,212,255,.55)}
      @keyframes _loaderBar{to{left:100%}}
      @keyframes _shine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}

      /* ── Skeleton shimmer ── */
      .skeleton-shimmer{border-radius:8px;background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.10) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:_shimmer 1.6s ease-in-out infinite}
      @keyframes _shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

      /* ══ LAYOUT SHELL ══════════════════════════════════════════════════════ */
      .site-shell{min-height:100vh;position:relative;overflow-x:hidden}
      .site-content{position:relative;z-index:2}
      .page-wrap{width:min(1280px,92vw);margin:0 auto;padding:1.6rem 0 3.4rem}

      /* ══ NAVIGATION ════════════════════════════════════════════════════════ */
      .site-nav{position:sticky;top:0;z-index:10;padding:1rem 0 0;backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
      .site-nav-inner{
        width:min(1280px,92vw);margin:0 auto;
        display:flex;align-items:center;justify-content:space-between;gap:1rem;
        padding:0.8rem 1rem;border-radius:22px;
        border:1px solid rgba(146,181,255,0.14);
        background:rgba(6,10,20,0.62);box-shadow:var(--shadow-md);
      }
      /* Brand lockup — exact size prevents nav height shift */
      .brand-lockup{display:inline-flex;align-items:center;gap:0.65rem;text-decoration:none}
      .brand-mark{
        width:36px;height:36px;border-radius:10px;flex-shrink:0;
        background:linear-gradient(135deg,#3bd0ff,#4df0b5);
        display:flex;align-items:center;justify-content:center;
        font-size:0.82rem;font-weight:800;color:#030f14;letter-spacing:0;
      }
      .brand-lockup strong{display:block;font-size:0.92rem;font-weight:700;color:#fff;line-height:1.1;letter-spacing:0}
      .brand-lockup small{display:block;font-size:0.66rem;color:var(--muted);font-weight:400;letter-spacing:0.01em}
      /* Desktop nav pills */
      .nav-links{display:flex;align-items:center;gap:0.35rem}
      .nav-pill{
        display:inline-flex;align-items:center;gap:0.35rem;
        padding:0.48rem 0.85rem;border-radius:12px;
        font-size:0.85rem;font-weight:500;color:var(--muted-strong);
        border:1px solid transparent;
        transition:background 160ms,border-color 160ms,color 160ms;
      }
      .nav-pill.active{background:rgba(59,208,255,0.1);border-color:rgba(59,208,255,0.25);color:#3bd0ff}
      /* Mobile hamburger — reserve space so nav never jumps */
      .mobile-menu-btn{
        display:none;align-items:center;justify-content:center;
        width:38px;height:38px;border-radius:10px;border:1px solid var(--panel-border);
        background:rgba(255,255,255,0.04);color:var(--muted-strong);cursor:pointer;
      }
      @media(max-width:768px){
        .desktop-nav{display:none!important}
        .mobile-menu-btn{display:flex}
        .site-nav{padding:0.6rem 0 0}
        .site-nav-inner{padding:0.55rem 0.75rem}
      }

      /* ── Transition + animation suppressor during JS hydration (mirrors index.css) ── */
      .js-loading *,.js-loading *::before,.js-loading *::after{transition:none!important;animation-play-state:paused!important}
      .resizing *,.resizing *::before,.resizing *::after{transition:none!important;animation:none!important}

      /* ══ HOME LAYOUT ═══════════════════════════════════════════════════════ */
      /* EXACT match: index.css .home-wrap — must be grid not flex */
      .home-wrap{display:grid;gap:1.45rem}

      /* ══ HERO V2 — full internal coverage ═════════════════════════════════ */
      .hero-v2{
        position:relative;overflow:hidden;border-radius:28px;
        border:1px solid rgba(145,180,255,0.15);
        background:linear-gradient(160deg,rgba(8,14,28,0.95) 0%,rgba(6,10,20,0.98) 100%);
        box-shadow:0 40px 100px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.04) inset;
        min-height:clamp(720px,92vh,960px);contain:layout paint style;
      }
      .hero-v2-inner{
        position:relative;z-index:2;padding:2rem 2rem 1.6rem;
        display:flex;flex-direction:column;gap:1.5rem;
        min-height:inherit;justify-content:space-between;
      }
      /* Topbar: status badge + social chips */
      .hero-v2-topbar{
        display:flex;align-items:center;justify-content:space-between;
        flex-wrap:wrap;gap:0.7rem;min-height:2.1rem;
      }
      /* hero-status-wrap — min-width MUST be on wrapper, NOT on badge itself */
      .hero-status-wrap{min-width:220px;flex-shrink:1}
      .status-badge{
        display:inline-flex;align-items:center;gap:0.55rem;
        padding:0.42rem 0.85rem;border-radius:999px;
        border:1px solid rgba(164,194,255,0.14);background:rgba(255,255,255,0.03);
        font-size:0.78rem;color:var(--muted-strong);font-weight:500;
      }
      .status-badge-text{white-space:nowrap}
      .status-badge.online{border-color:rgba(61,221,142,0.3);color:#6cf0b0}
      .status-dot-pulse{width:7px;height:7px;border-radius:50%;background:#3fe08e;position:relative;flex-shrink:0}
      .hero-v2-social{display:flex;gap:0.5rem;flex-wrap:wrap}
      .social-chip{
        padding:0.38rem 0.72rem;border-radius:999px;
        border:1px solid rgba(160,190,255,0.13);background:rgba(255,255,255,0.025);
        color:var(--muted);font-size:0.76rem;font-weight:500;
      }
      /* Heading area — min-height prevents collapse during hydration */
      .hero-v2-heading{
        text-align:center;max-width:60rem;margin:0 auto;
        min-height:20rem;display:grid;align-content:center;
      }
      .hero-kicker-pill{
        display:inline-flex;align-items:center;gap:0.45rem;
        padding:0.45rem 0.9rem;border-radius:999px;
        border:1px solid rgba(162,191,255,0.18);background:rgba(255,255,255,0.04);
        color:#b0cbff;font-size:0.76rem;font-weight:600;
        letter-spacing:0.04em;text-transform:uppercase;margin-bottom:1rem;
      }
      .hero-v2-title{
        font-family:var(--font-display);font-size:clamp(3.5rem,7vw,7rem);
        font-weight:800;line-height:0.9;letter-spacing:0;margin:0;color:#fff;text-wrap:balance;
      }
      .hero-v2-title .accent-gradient{
        background:linear-gradient(120deg,#4ad4ff 0%,#4df0b5 55%,#a78bfa 100%);
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      }
      .hero-v2-subtitle{
        margin:1.1rem auto 0;max-width:46rem;
        color:var(--muted);font-size:1.08rem;line-height:1.78;
      }
      /* CTA buttons */
      .hero-v2-actions{
        display:flex;gap:0.85rem;justify-content:center;flex-wrap:wrap;margin-top:1.4rem;
      }
      .btn-primary-hero{
        display:inline-flex;align-items:center;gap:0.55rem;
        padding:0.9rem 1.4rem;border-radius:16px;font-weight:700;font-size:0.97rem;
        color:#021018;background:linear-gradient(120deg,#4ad4ff,#4df0b5);
        box-shadow:0 16px 40px rgba(67,222,255,0.22);
        transition:transform 180ms ease,box-shadow 180ms ease;
      }
      .btn-secondary-hero{
        display:inline-flex;align-items:center;gap:0.55rem;
        padding:0.9rem 1.35rem;border-radius:16px;font-weight:600;font-size:0.95rem;
        color:#c9dbff;background:rgba(255,255,255,0.04);
        border:1px solid rgba(156,190,255,0.18);
        transition:border-color 180ms ease,background 180ms ease,transform 180ms ease;
      }
      /* Stats grid — min-height prevents collapse */
      .hero-v2-stats{
        display:grid;grid-template-columns:repeat(4,1fr);gap:0.85rem;min-height:7.5rem;
      }
      .hero-stat-card{
        position:relative;overflow:hidden;padding:1.1rem 1rem;border-radius:20px;
        border:1px solid rgba(160,190,255,0.12);background:rgba(255,255,255,0.03);text-align:center;
      }
      .stat-number{
        display:block;font-family:var(--font-display);font-size:1.7rem;font-weight:800;
        background:linear-gradient(120deg,#fff 40%,var(--stat-color,#3bd0ff));
        -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
        letter-spacing:0;
      }
      .stat-label{display:block;font-size:0.78rem;color:var(--muted);margin-top:0.2rem;font-weight:500}
      /* Ticker — min-height holds space */
      .ticker-wrap{overflow:hidden;mask-image:linear-gradient(90deg,transparent 0%,#000 8%,#000 92%,transparent 100%);padding:0.1rem 0;min-height:2rem}
      .ticker-track{display:flex;gap:0.6rem;width:max-content;animation:ticker-scroll 45s linear infinite;will-change:transform}
      @keyframes ticker-scroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
      .ticker-item{
        display:inline-flex;align-items:center;gap:0.45rem;padding:0.4rem 0.85rem;
        border-radius:999px;border:1px solid rgba(160,190,255,0.1);
        background:rgba(255,255,255,0.025);color:var(--muted);font-size:0.76rem;font-weight:500;
        white-space:nowrap;flex-shrink:0;
      }
      /* Quick access */
      .hero-v2-quick{text-align:center;min-height:5.5rem}
      .quick-label{display:block;font-size:0.74rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);margin-bottom:0.75rem}
      .quick-grid{display:flex;flex-wrap:wrap;gap:0.55rem;justify-content:center}
      .quick-chip{
        display:inline-flex;align-items:center;gap:0.45rem;padding:0.56rem 1rem;border-radius:12px;
        border:1px solid rgba(156,190,255,0.12);background:rgba(255,255,255,0.02);
        color:var(--muted-strong);font-size:0.83rem;font-weight:500;
        transition:border-color 180ms ease,background 180ms ease,transform 180ms ease,color 180ms ease;
      }
      /* Trust row */
      .trust-row{
        display:flex;flex-wrap:wrap;gap:0.6rem;justify-content:center;
        padding-top:0.5rem;border-top:1px solid rgba(160,190,255,0.08);min-height:2.5rem;
      }
      .trust-badge{
        display:inline-flex;align-items:center;gap:0.42rem;padding:0.34rem 0.7rem;
        border-radius:999px;background:rgba(255,255,255,0.025);
        border:1px solid rgba(160,190,255,0.09);color:var(--muted);font-size:0.74rem;font-weight:500;
      }
      .hero-v2-orb{display:none}
      .hero-v2-grid{position:absolute;inset:0;pointer-events:none;background-image:linear-gradient(rgba(150,180,255,0.06) 1px,transparent 1px),linear-gradient(90deg,rgba(150,180,255,0.06) 1px,transparent 1px);background-size:48px 48px;mask-image:linear-gradient(180deg,transparent 0%,rgba(0,0,0,0.6) 20%,rgba(0,0,0,0.6) 80%,transparent 100%)}

      @media(max-width:900px){
        .hero-v2{min-height:auto;border-radius:22px}
        .hero-v2-stats{grid-template-columns:repeat(2,1fr)}
        .page-wrap{width:min(1280px,94vw)}
      }
      @media(max-width:768px){
        .hero-status-wrap{min-width:0;flex-shrink:1}
      }
      @media(max-width:600px){
        .page-wrap{width:calc(100vw - 2rem);padding:0.8rem 0 2rem;margin:0 auto}
        .site-nav{padding:0.5rem 0.75rem 0}
        .site-nav-inner{width:100%;max-width:100%;border-radius:16px}
        .hero-v2{border-radius:18px}
        .hero-v2-inner{padding:1.2rem 1rem 1rem;gap:1rem;min-height:auto;justify-content:start}
        .hero-v2-heading{min-height:auto}
        .hero-v2-title{font-size:clamp(2.2rem,11vw,4rem);word-break:break-word;overflow-wrap:break-word}
        .hero-v2-subtitle{font-size:0.92rem;line-height:1.65}
        .hero-v2-stats{grid-template-columns:repeat(2,1fr);gap:0.5rem;min-height:auto}
        .hero-stat-card{padding:0.85rem 0.6rem;border-radius:14px}
        .stat-number{font-size:1.35rem}
        .stat-label{font-size:0.72rem}
        .hero-v2-topbar{flex-direction:column;align-items:flex-start;gap:0.5rem}
        .hero-status-wrap{min-width:0;width:100%}
        .hero-v2-actions{flex-direction:column;align-items:stretch}
        .btn-primary-hero,.btn-secondary-hero{width:100%;justify-content:center;padding:0.8rem 1rem;font-size:0.9rem;border-radius:14px}
        .hero-v2-quick{min-height:auto}
        .quick-chip{padding:0.45rem 0.7rem;font-size:0.76rem;border-radius:10px}
        .quick-grid{gap:0.4rem}
        .trust-badge{padding:0.28rem 0.55rem;font-size:0.68rem}
        .trust-row{gap:0.4rem}
        .hero-kicker-pill{font-size:0.65rem;padding:0.35rem 0.7rem}
        .social-chip{padding:0.32rem 0.55rem;font-size:0.7rem}
        .status-badge{min-width:0}
        .surface-panel{padding:1rem 0.9rem;border-radius:18px}
        .category-pill{padding:0.45rem 0.65rem;font-size:0.78rem}
        .category-row{gap:0.45rem}
        .tool-grid{grid-template-columns:1fr;gap:0.75rem}
      }
      @media(max-width:380px){
        .page-wrap{width:calc(100vw - 1.5rem);margin:0 auto}
        .site-nav{padding:0.4rem 0.5rem 0}
        .site-nav-inner{width:100%;padding:0.5rem 0.65rem;border-radius:14px}
        .hero-v2{border-radius:14px}
        .hero-v2-inner{padding:1rem 0.75rem 0.85rem;gap:0.85rem}
        .hero-v2-title{font-size:clamp(1.8rem,10vw,3rem)}
        .hero-stat-card{padding:0.7rem 0.45rem;border-radius:12px}
        .stat-number{font-size:1.15rem}
        .brand-lockup small{display:none}
        .brand-mark{width:34px;height:34px;border-radius:9px}
      }
    </style>

    <!-- ═══════════════════════════════════════════════════════════════════════
         THE DEFINITIVE FOUC FIX — CSS as a render-blocking <link> stylesheet.
         
         Why this matters: `import './index.css'` in main.tsx makes CSS load as
         a JS module AFTER React's entire bundle downloads and executes. During
         that window the page renders with no styles → broken/unstyled appearance.
         
         The fix: loading CSS as a <link rel="stylesheet"> makes the browser BLOCK
         rendering until CSS is ready. The page NEVER renders without styles.
         This is how every major site works (Google, Meta, Apple, Netflix).
